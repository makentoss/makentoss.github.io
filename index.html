<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTGT - Premium Growtopia Private Server</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ffd700;
            --accent: #5865F2;
            --bg: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        /* --- ANIMATED PARTICLES BG --- */
        #particles-js {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
        }

        /* --- MAIN BOARD --- */
        .main-board {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 50px 30px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 1s ease-out;
            margin-bottom: 30px;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .logo-area { margin-bottom: 30px; }
        .logo-text { font-family: 'Fredoka One', cursive; font-size: 3.5rem; color: var(--primary); text-shadow: 0 0 20px rgba(255, 215, 0, 0.3); }
        .status-pill { background: rgba(0, 255, 127, 0.1); color: #00ff7f; padding: 6px 15px; border-radius: 20px; font-size: 0.7rem; font-weight: 800; letter-spacing: 1px; }

        .info-grid { display: flex; flex-direction: column; gap: 15px; margin: 30px 0; }
        .info-card { background: rgba(255,255,255,0.02); padding: 15px; border-radius: 15px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .info-label { color: rgba(255,255,255,0.4); font-size: 0.8rem; font-weight: 600; }
        .info-value { color: #fff; font-weight: 800; font-size: 0.9rem; }

        /* --- BUTTONS --- */
        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        .btn { padding: 16px; border-radius: 16px; text-decoration: none; font-weight: 800; font-size: 0.9rem; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-discord { background: var(--accent); color: white; }
        .btn-discord:hover { transform: scale(1.03); box-shadow: 0 10px 20px rgba(88, 101, 242, 0.3); }

        /* --- SEPARATE PREMIUM MARKET --- */
        .store-container {
            width: 100%;
            max-width: 500px;
            padding: 25px;
            background: rgba(255, 215, 0, 0.02);
            border-radius: 30px;
            border: 1px solid rgba(255, 215, 0, 0.1);
            animation: fadeIn 1.2s ease-out;
        }

        .store-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .dot { height: 8px; width: 8px; background: var(--primary); border-radius: 50%; box-shadow: 0 0 10px var(--primary); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.5; } 100% { transform: scale(1); opacity: 1; } }
        .store-header h2 { font-size: 0.8rem; letter-spacing: 3px; color: rgba(255,215,0,0.6); margin: 0; text-transform: uppercase; }

        .store-item {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0, 0, 0, 0.3); padding: 20px; border-radius: 20px;
            border: 1px solid var(--border);
        }
        .item-icon-box { width: 50px; height: 50px; background: rgba(255,215,0,0.1); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; }
        .item-details { text-align: left; flex-grow: 1; margin-left: 15px; }
        .item-name { display: block; color: #fff; font-weight: 700; }
        .item-hint { font-size: 0.65rem; color: rgba(255,255,255,0.3); }
        .price-tag { color: var(--primary); font-family: 'Fredoka One'; font-size: 1.4rem; }

        .buy-now-btn {
            background: #fff; color: #000; text-decoration: none;
            padding: 10px 20px; border-radius: 12px; font-weight: 900;
            font-size: 0.8rem; transition: 0.3s;
        }
        .buy-now-btn:hover { background: var(--primary); transform: translateY(-3px); box-shadow: 0 10px 20px rgba(255,215,0,0.2); }

        /* --- FOOTER FEED --- */
        .live-feed { margin-top: 30px; color: rgba(255,255,255,0.2); font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

    </style>
</head>
<body>

<div id="particles-js"></div>

<div class="main-board">
    <div class="logo-area">
        <span class="status-pill">● ONLINE & SECURE</span>
        <h1 class="logo-text">GTGT</h1>
    </div>

    <div class="info-grid">
        <div class="info-card">
            <span class="info-label">SERVER IP</span>
            <span class="info-value">91.134.85.13</span>
        </div>
        <div class="info-card">
            <span class="info-label">PORT</span>
            <span class="info-value">17091</span>
        </div>
    </div>

    <div class="btn-group">
        <a href="https://discord.com/channels/1388213237023244449/1388280631594717184" class="btn btn-discord">
            <span>JOIN DISCORD</span>
        </a>
    </div>
</div>

<div class="store-container">
    <div class="store-header">
        <span class="dot"></span>
        <h2>Premium Market</h2>
    </div>

    <div class="store-item">
        <div class="item-icon-box">💎</div>
        <div class="item-details">
            <span class="item-name">Premium World Lock</span>
            <span class="item-hint">Automatic Apple/Card Checkout</span>
        </div>
        <div style="text-align: right; margin-right: 15px;">
            <div class="price-tag">€1.00</div>
        </div>
        <a href="https://ko-fi.com/playgtgt/shop" target="_blank" class="buy-now-btn">BUY</a>
    </div>
    <p style="font-size: 0.6rem; color: rgba(255,255,255,0.2); margin-top: 15px; text-align: center;">
        NOTE: PROVIDE YOUR GROWID IN THE MESSAGE BOX AT CHECKOUT
    </p>
</div>

<div class="live-feed">Recent activity: 💎 10 PWL purchased by *******</div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
    particlesJS("particles-js", {
        "particles": {
            "number": { "value": 80, "density": { "enable": true, "value_area": 800 } },
            "color": { "value": "#ffd700" },
            "shape": { "type": "circle" },
            "opacity": { "value": 0.2, "random": true },
            "size": { "value": 3, "random": true },
            "line_linked": { "enable": true, "distance": 150, "color": "#ffd700", "opacity": 0.1, "width": 1 },
            "move": { "enable": true, "speed": 1, "direction": "none", "random": true, "straight": false, "out_mode": "out", "bounce": false }
        },
        "interactivity": {
            "detect_on": "canvas",
            "events": { "onhover": { "enable": true, "mode": "grab" }, "onclick": { "enable": true, "mode": "push" }, "resize": true }
        },
        "retina_detect": true
    });
</script>

</body>
</html>
