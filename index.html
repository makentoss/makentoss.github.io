<!DOCTYPE html>
<html>
<head>
    <title>GTGT | Home</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Poppins:wght@400;600&display=swap');

        /* Animation Keyframes */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        body { 
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), 
                        url('background.png') no-repeat center center fixed; 
            background-size: cover; 
            color: white; 
            font-family: 'Poppins', sans-serif; 
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .box { 
            /* Light, Bubbly, Transparent Background */
            background: rgba(255, 255, 255, 0.15); 
            border: 1px solid rgba(255, 255, 255, 0.3); 
            padding: 40px; 
            border-radius: 30px; 
            width: 90%;
            max-width: 480px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
            text-align: center;
            backdrop-filter: blur(20px); /* The "Glass" effect */
            -webkit-backdrop-filter: blur(20px);
            
            /* Animations */
            animation: fadeInUp 1s ease-out forwards, float 5s ease-in-out infinite;
        }

        h1 { 
            font-family: 'Fredoka One', cursive; 
            font-size: 5.5rem; 
            margin: 0;
            background: linear-gradient(to bottom, #fff700 0%, #ffcc00 50%, #ff9900 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(4px 4px 0px rgba(0,0,0,0.5));
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #fff;
            margin-top: -5px;
            margin-bottom: 30px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
            font-weight: 500;
        }

        .section-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 2px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .hosts-container { 
            /* Darker semi-transparent bubble for the code */
            background: rgba(0, 0, 0, 0.3); 
            padding: 20px; 
            border-radius: 15px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            margin-bottom: 25px; 
            text-align: left; 
        }

        code { 
            /* Changed from Green to Golden Yellow */
            color: #ffd700; 
            font-family: 'Courier New', monospace; 
            font-size: 0.95rem; 
            line-height: 1.6;
            display: block;
            white-space: pre;
            text-shadow: 0 0 5px rgba(255, 215, 0, 0.3);
        }

        .btn { 
            background: #5865F2; 
            color: white; 
            padding: 16px; 
            text-decoration: none; 
            border-radius: 50px; /* Bubbly rounded button */
            font-weight: 600; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            font-size: 1.1rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .btn:hover { 
            background: #4752c4; 
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(88, 101, 242, 0.4);
        }

        .discord-icon {
            width: 24px;
            height: 24px;
            fill: white;
        }

        .footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.6);
            letter-spacing: 1px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>GTGT</h1>
        <p class="subtitle">The Growtopia experience, evolved.</p>
        
        <div class="section-label">Server Connection</div>
        <div class="hosts-container">
            <code>91.134.85.13 growtopia1.com
91.134.85.13 growtopia2.com
91.134.85.13 www.growtopia1.com
91.134.85.13 www.growtopia2.com</code>
        </div>

        <a href="https://discord.gg/qkaVBCUrna" class="btn">

    </div>

    <div class="footer">DEVELOPED BY GTGT TEAM &copy; 2026</div>

</body>
</html>
