<!DOCTYPE html>
<html>
<head>
    <title>GTGT | Home</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Poppins:wght@400;600&display=swap');

        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; -webkit-font-smoothing: antialiased; }

        body { 
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), 
                        url('background.png') no-repeat center center fixed; 
            background-size: cover; color: white; font-family: 'Poppins', sans-serif; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        /* --- Animations --- */
        @keyframes float { 0%, 100% { transform: translate3d(0, 0, 0); } 50% { transform: translate3d(0, -15px, 0); } }
        @keyframes goldGlow { 
            0%, 100% { filter: drop-shadow(0 0 5px rgba(255, 215, 0, 0.4)) drop-shadow(4px 4px 0px rgba(0,0,0,0.6)); } 
            50% { filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.8)) drop-shadow(4px 4px 0px rgba(0,0,0,0.6)); } 
        }
        @keyframes boxPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.1), 0 25px 50px rgba(0,0,0,0.4); border-color: rgba(255, 215, 0, 0.3); }
            50% { box-shadow: 0 0 40px rgba(255, 215, 0, 0.3), 0 25px 50px rgba(0,0,0,0.4); border-color: rgba(255, 215, 0, 0.6); }
        }

        .box { 
            position: relative; z-index: 10; background: rgba(255, 255, 255, 0.12); 
            border: 1px solid rgba(255, 215, 0, 0.3); padding: 35px; border-radius: 40px; 
            width: 90%; max-width: 420px; text-align: center; backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px); animation: float 6s ease-in-out infinite, boxPulse 4s ease-in-out infinite;
        }

        .live-counter {
            font-family: 'Fredoka One', cursive; font-size: 0.8rem; margin-bottom: -5px;
            background: linear-gradient(to bottom, #fff700, #ffcc00); -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; filter: drop-shadow(2px 2px 0px rgba(0,0,0,0.3)); 
            letter-spacing: 1.5px; text-transform: uppercase; opacity: 0.9;
        }

        h1 { 
            font-family: 'Fredoka One', cursive; font-size: 5rem; margin: 0;
            background: linear-gradient(to bottom, #fff700 0%, #ffcc00 50%, #ff9900 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: goldGlow 3s ease-in-out infinite; line-height: 1;
        }

        /* --- Tabs --- */
        .tab-bar { display: flex; justify-content: center; gap: 8px; margin: 20px 0 15px 0; }
        .tab {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,215,0,0.2);
            color: rgba(255,255,255,0.6); padding: 8px 12px; border-radius: 12px;
            font-size: 0.7rem; cursor: pointer; transition: 0.3s; font-weight: 600; flex: 1;
        }
        .tab.active { background: rgba(255,215,0,0.2); border-color: #ffd700; color: #ffd700; }

        /* --- Host/Download Area --- */
        .display-area { min-height: 120px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; }
        
        .hosts-wrapper { position: relative; width: 100%; }
        .hosts-container { background: rgba(0, 0, 0, 0.6); padding: 15px; border-radius: 20px; border: 1px solid rgba(255, 215, 0, 0.1); text-align: left; }
        code { color: #ffd700; font-family: 'Courier New', monospace; font-size: 0.7rem; line-height: 1.4; display: block; white-space: pre; }

        .copy-btn {
            position: absolute; top: 10px; right: 10px;
            background: rgba(255, 215, 0, 0.1); border: 1px solid rgba(255, 215, 0, 0.3);
            color: #ffd700; padding: 4px 10px; border-radius: 8px; font-size: 0.6rem; cursor: pointer;
        }

        .dl-btn {
            background: linear-gradient(45deg, #ffd700, #ffa500); color: black;
            padding: 20px 40px; border-radius: 20px; text-decoration: none; font-weight: 800;
            font-size: 1.1rem; display: none; width: 100%; box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
            transition: 0.3s;
        }
        .dl-btn:hover { transform: scale(1.03); filter: brightness(1.1); }

        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        .btn { padding: 14px; text-decoration: none; border-radius: 50px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s ease; font-size: 0.95rem; }
        .btn-discord { background: #5865F2; color: white; }
        .btn-tutorial { background: rgba(255, 215, 0, 0.05); border: 2px solid rgba(255, 215, 0, 0.4); color: #ffd700; }
        .btn:hover { transform: scale(1.02); }

        .footer { margin-top: 25px; font-size: 0.65rem; color: rgba(255,255,255,0.3); font-weight: 600; letter-spacing: 1px; }

        .particles { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .particle { position: absolute; bottom: -20px; background: rgba(255, 215, 0, 0.2); border-radius: 50%; animation: drift linear infinite; }
        @keyframes drift { from { transform: translateY(0); opacity: 0; } 20% { opacity: 0.3; } to { transform: translateY(-110vh); opacity: 0; } }
    </style>
</head>
<body>
    <div class="particles" id="particle-container"></div>

    <div class="box">
        <div class="live-counter" id="playerCountText">ONLINE PLAYERS: 0</div>
        <h1>GTGT</h1>
        
        <div class="tab-bar">
            <div class="tab active" onclick="switchMode('pc', this)">WINDOWS</div>
            <div class="tab" onclick="switchMode('android', this)">ANDROID</div>
            <div class="tab" onclick="switchMode('ios', this)">iOS</div>
        </div>

        <div class="display-area">
            <div id="pcSection" class="hosts-wrapper">
                <button class="copy-btn" onclick="copyHosts()">Copy</button>
                <div class="hosts-container">
                    <code id="hostCode">91.134.85.13 growtopia1.com
91.134.85.13 growtopia2.com
91.134.85.13 www.growtopia1.com
91.134.85.13 www.growtopia2.com</code>
                </div>
            </div>

            <a id="androidBtn" href="https://dash.gtps.cloud/android/50" target="_blank" class="dl-btn">DOWNLOAD ANDROID</a>
            <a id="iosBtn" href="https://dash.gtps.cloud/ios/50" target="_blank" class="dl-btn">DOWNLOAD iOS</a>
        </div>

        <div class="btn-group">
            <a href="https://discord.gg/qkaVBCUrna" target="_blank" class="btn btn-discord">Join Discord</a>
            <a href="https://discord.gg/WNr99UZtSe" target="_blank" class="btn btn-tutorial">How To Join</a>
        </div>
    </div>

    <div class="footer">DEVELOPED BY GTGT TEAM &copy; 2026</div>

    <script>
        const discordID = '1388213237023244449';

        function switchMode(device, element) {
            // Update Active Tab UI
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            element.classList.add('active');

            // Hide everything first
            document.getElementById('pcSection').style.display = 'none';
            document.getElementById('androidBtn').style.display = 'none';
            document.getElementById('iosBtn').style.display = 'none';

            // Show the selected one
            if(device === 'pc') {
                document.getElementById('pcSection').style.display = 'block';
            } else if(device === 'android') {
                document.getElementById('androidBtn').style.display = 'block';
            } else {
                document.getElementById('iosBtn').style.display = 'block';
            }
        }

        async function updatePlayerCount() {
            try {
                const response = await fetch(`https://discord.com/api/guilds/${discordID}/widget.json`);
                const data = await response.json();
                document.getElementById('playerCountText').innerText = `ONLINE PLAYERS: ${data.presence_count}`;
            } catch (e) { }
        }

        updatePlayerCount();
        setInterval(updatePlayerCount, 30000);

        function copyHosts() {
            const text = document.getElementById('hostCode').innerText;
            const btn = document.querySelector('.copy-btn');
            navigator.clipboard.writeText(text).then(() => {
                btn.innerText = 'Copied!';
                setTimeout(() => { btn.innerText = 'Copy'; }, 2000);
            });
        }

        const container = document.getElementById('particle-container');
        for (let i = 0; i < 20; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.width = p.style.height = Math.random() * 4 + 2 + 'px';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDuration = Math.random() * 8 + 6 + 's';
            p.style.animationDelay = Math.random() * 8 + 's';
            container.appendChild(p);
        }
    </script>
</body>
</html>
