<!DOCTYPE html>
<html>
<head>
    <title>GTGT | Home</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Poppins:wght@400;600&display=swap');

        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; -webkit-font-smoothing: antialiased; }

        body { 
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), 
                        url('background.png') no-repeat center center fixed; 
            background-size: cover; color: white; font-family: 'Poppins', sans-serif; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        /* Gradient Text Animation */
        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes fadeIn { from { opacity: 0; transform: translate3d(0, 20px, 0); } to { opacity: 1; transform: translate3d(0, 0, 0); } }
        @keyframes float { 0%, 100% { transform: translate3d(0, 0, 0); } 50% { transform: translate3d(0, -10px, 0); } }
        
        /* The Floating Counter Above the Box */
        .live-counter {
            font-family: 'Fredoka One', cursive;
            font-size: 1.5rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            /* Animated Gradient */
            background: linear-gradient(90deg, #fff700, #ff9900, #00ff00, #fff700);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientFlow 4s ease infinite;
            filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.5));
            z-index: 15;
        }

        .box { 
            position: relative; z-index: 10;
            background: rgba(255, 255, 255, 0.12); 
            border: 1px solid rgba(255, 215, 0, 0.3);
            padding: 40px; border-radius: 40px; width: 90%; max-width: 420px; 
            text-align: center; backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            animation: fadeIn 1.2s ease forwards, float 6s ease-in-out infinite;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.15), 0 25px 50px rgba(0,0,0,0.4);
        }

        h1 { 
            font-family: 'Fredoka One', cursive; font-size: 5.5rem; margin: 0;
            background: linear-gradient(to bottom, #fff700 0%, #ffcc00 50%, #ff9900 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(4px 4px 0px rgba(0,0,0,0.6)); line-height: 1;
        }

        .subtitle { font-size: 1rem; color: rgba(255,255,255,0.9); margin: 10px 0 30px 0; }

        /* Server Status Dot inside the box */
        .status-badge {
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(0,0,0,0.4); padding: 5px 15px; border-radius: 20px;
            font-size: 0.8rem; color: #00ff00; font-weight: 600; margin-bottom: 20px;
        }
        .dot { width: 8px; height: 8px; background: #00ff00; border-radius: 50%; box-shadow: 0 0 10px #00ff00; }

        .hosts-wrapper { position: relative; margin-bottom: 25px; }
        .hosts-container { background: rgba(0, 0, 0, 0.6); padding: 20px; border-radius: 20px; border: 1px solid rgba(255, 215, 0, 0.2); text-align: left; }
        code { color: #ffd700; font-family: 'Courier New', monospace; font-size: 0.85rem; line-height: 1.5; display: block; white-space: pre; }

        .copy-btn {
            position: absolute; top: 10px; right: 10px;
            background: rgba(255, 215, 0, 0.2); border: 1px solid rgba(255, 215, 0, 0.4);
            color: #ffd700; padding: 5px 12px; border-radius: 12px; font-size: 0.7rem; cursor: pointer;
        }

        .btn { 
            background: #5865F2; color: white; padding: 16px; text-decoration: none; 
            border-radius: 50px; font-weight: 600; display: flex; align-items: center;
            justify-content: center; gap: 12px; transition: 0.4s ease; font-size: 1.1rem;
        }
        .btn:hover { background: #4752c4; transform: scale(1.05); }

        .footer { margin-top: 30px; font-size: 0.8rem; color: rgba(255,255,255,0.4); font-weight: 600; }
        .particles { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .particle { position: absolute; bottom: -20px; background: rgba(255, 215, 0, 0.3); border-radius: 50%; animation: drift linear infinite; }
        @keyframes drift { from { transform: translateY(0); opacity: 0; } 20% { opacity: 0.4; } to { transform: translateY(-110vh); opacity: 0; } }
    </style>
</head>
<body>
    <div class="particles" id="particle-container"></div>

    <div class="live-counter" id="playerCountText">Currently Online Players: 0</div>

    <div class="box">
        <div class="status-badge"><span class="dot"></span> SERVER ONLINE</div>
        <h1>GTGT</h1>
        <p class="subtitle">The Growtopia experience, evolved.</p>
        
        <div class="hosts-wrapper">
            <button class="copy-btn" onclick="copyHosts()">Copy</button>
            <div class="hosts-container">
                <code id="hostCode">91.134.85.13 growtopia1.com
91.134.85.13 growtopia2.com
91.134.85.13 www.growtopia1.com
91.134.85.13 www.growtopia2.com</code>
            </div>
        </div>

        <a href="https://discord.gg/qkaVBCUrna" class="btn">
            <svg style="width:24px;height:24px;fill:white" viewBox="0 0 127.14 96.36"><path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.06,72.06,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.71,32.65-1.82,56.6.39,80.21a105.73,105.73,0,0,0,32.17,16.15,77.7,77.7,0,0,0,6.89-11.11,68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1,105.25,105.25,0,0,0,32.19-16.14c2.64-27.38-4.52-51.06-19.73-72.13ZM42.48,65.69c-6.3,0-11.48-5.78-11.48-12.89S36.1,39.9,42.48,39.9s11.48,5.78,11.48,12.89S48.86,65.69,42.48,65.69Zm42.24,0c-6.3,0-11.48-5.78-11.48-12.89S78.34,39.9,84.72,39.9s11.48,5.78,11.48,12.89S91.1,65.69,84.72,65.69Z"/></svg>
            Join Discord
        </a>
    </div>

    <div class="footer">DEVELOPED BY GTGT TEAM &copy; 2026</div>

    <script>
        // Your Specific Discord ID
        const discordID = '1388213237023244449'; 

        async function updatePlayerCount() {
            try {
                // Fetching from Discord Widget JSON
                const response = await fetch(`https://discord.com/api/guilds/${discordID}/widget.json`);
                const data = await response.json();
                // Update the floating text
                document.getElementById('playerCountText').innerText = `Currently Online Players: ${data.presence_count}`;
            } catch (error) {
                console.log("Widget error:", error);
            }
        }

        // Initialize
        updatePlayerCount();
        setInterval(updatePlayerCount, 30000); 

        function copyHosts() {
            const text = document.getElementById('hostCode').innerText;
            const btn = document.querySelector('.copy-btn');
            navigator.clipboard.writeText(text).then(() => {
                btn.innerText = 'Copied!';
                btn.style.background = 'rgba(0, 255, 0, 0.3)';
                setTimeout(() => { btn.innerText = 'Copy'; btn.style.background = 'rgba(255, 215, 0, 0.2)'; }, 2000);
            });
        }

        const container = document.getElementById('particle-container');
        for (let i = 0; i < 20; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.width = p.style.height = Math.random() * 4 + 2 + 'px';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDuration = Math.random() * 8 + 6 + 's';
            p.style.animationDelay = Math.random() * 8 + 's';
            container.appendChild(p);
        }
    </script>
</body>
</html>
