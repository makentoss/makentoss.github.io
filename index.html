<!DOCTYPE html>
<html lang="en">
<head>
    <title>GTGT | Home</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Poppins:wght@400;600&display=swap');

        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; -webkit-font-smoothing: antialiased; }

        body { 
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), 
                        url('background.png') no-repeat center center fixed; 
            background-size: cover; color: white; font-family: 'Poppins', sans-serif; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        /* --- Animations --- */
        @keyframes float { 0%, 100% { transform: translate3d(0, 0, 0); } 50% { transform: translate3d(0, -10px, 0); } }
        @keyframes goldGlow { 
            0%, 100% { filter: drop-shadow(0 0 5px rgba(255, 215, 0, 0.4)); } 
            50% { filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.8)); } 
        }
        @keyframes drift {
            from { transform: translateY(0) rotate(0deg); opacity: 0; }
            15% { opacity: 0.4; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }

        /* --- Main Box --- */
        .box { 
            position: relative; z-index: 10; background: rgba(255, 255, 255, 0.1); 
            border: 2px solid rgba(255, 215, 0, 0.3); padding: 35px; border-radius: 40px; 
            width: 90%; max-width: 400px; text-align: center; backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); animation: float 6s ease-in-out infinite;
        }

        h1 { 
            font-family: 'Fredoka One', cursive; font-size: 4.5rem; margin: 0;
            background: linear-gradient(to bottom, #fff700, #ff9900);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: goldGlow 3s ease-in-out infinite;
        }

        .live-counter { font-family: 'Fredoka One'; font-size: 0.8rem; color: #ffd700; letter-spacing: 1px; margin-bottom: 10px; opacity: 0.9; }

        /* --- Exclusive Shop --- */
        .shop-container {
            margin: 20px 0; background: rgba(0, 0, 0, 0.3); border-radius: 25px;
            padding: 15px; border: 1px solid rgba(255, 215, 0, 0.2);
        }
        .shop-header { font-family: 'Fredoka One'; color: #ffd700; font-size: 0.9rem; margin-bottom: 15px; text-transform: uppercase; }
        
        .shop-item {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(255, 215, 0, 0.05); padding: 12px 15px; border-radius: 15px;
            margin-bottom: 10px; border: 1px solid rgba(255, 215, 0, 0.1); transition: 0.3s;
        }
        .shop-item:hover { background: rgba(255, 215, 0, 0.1); transform: scale(1.02); }
        
        .item-info { text-align: left; }
        .item-name { font-weight: 600; font-size: 0.85rem; color: #fff; display: block; }
        .item-desc { font-size: 0.7rem; color: rgba(255,255,255,0.5); }
        
        .buy-btn {
            background: #ffd700; color: #000; padding: 5px 12px; border-radius: 10px;
            font-size: 0.75rem; font-weight: 800; text-decoration: none; transition: 0.2s;
        }
        .buy-btn:hover { background: #fff; box-shadow: 0 0 10px #ffd700; }

        /* --- Footer Buttons --- */
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn { 
            padding: 12px; text-decoration: none; border-radius: 20px; 
            font-weight: 600; font-size: 0.8rem; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-discord { background: #5865F2; color: white; }
        .btn-tutorial { background: rgba(255, 215, 0, 0.1); border: 1px solid #ffd700; color: #ffd700; }

        /* --- Particles --- */
        .particles { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .particle { position: absolute; bottom: -20px; background: rgba(255, 215, 0, 0.3); border-radius: 50%; animation: drift linear infinite; }
        
        /* Overlay Styles from previous versions kept... */
        #tutorialOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); z-index: 200; display: none; align-items: center; justify-content: center; opacity: 0; transition: 0.4s; }
        .modal { width: 90%; max-width: 450px; text-align: center; }
        .close-btn { position: absolute; top: 20px; right: 30px; font-size: 2rem; color: #ffd700; cursor: pointer; }
    </style>
</head>
<body>
    <div class="particles" id="particle-container"></div>

    <div class="box">
        <div class="live-counter" id="gameCounter">PLAYERS ONLINE: 0</div>
        <h1>GTGT</h1>
        
        <div class="shop-container">
            <div class="shop-header">✨ Exclusive Shop ✨</div>
            
            <div class="shop-item">
                <div class="item-info">
                    <span class="item-name">5x Blue Gem Locks</span>
                    <span class="item-desc">Premium Currency Package</span>
                </div>
                <a href="https://dash.gtps.cloud/server/50/store" target="_blank" class="buy-btn">$4.99</a>
            </div>

            <div class="shop-item" style="border-color: #ffd700;">
                <div class="item-info">
                    <span class="item-name">VIP Rank</span>
                    <span class="item-desc">Exclusive Commands & Effects</span>
                </div>
                <a href="https://dash.gtps.cloud/server/50/store" target="_blank" class="buy-btn" style="background: #fff;">$9.99</a>
            </div>

            <div class="shop-item">
                <div class="item-info">
                    <span class="item-name">100x Growtokens</span>
                    <span class="item-desc">Instant delivery to inventory</span>
                </div>
                <a href="https://dash.gtps.cloud/server/50/store" target="_blank" class="buy-btn">$2.50</a>
            </div>
        </div>

        <div class="btn-group">
            <a href="https://discord.gg/qkaVBCUrna" target="_blank" class="btn btn-discord">Discord</a>
            <button onclick="toggleTutorial(true)" class="btn btn-tutorial">How to Join</button>
        </div>
    </div>

    <script>
        // Update Server ID here
        const serverID = '50';

        async function updateStats() {
            try {
                const res = await fetch(`https://dash.gtps.cloud/api/v1/server/${serverID}/status`);
                const data = await res.json();
                document.getElementById('gameCounter').innerText = `PLAYERS ONLINE: ${data.players || 0}`;
            } catch (e) { document.getElementById('gameCounter').innerText = "SERVER: OFFLINE"; }
        }

        function toggleTutorial(s) { 
            const o = document.getElementById('tutorialOverlay'); 
            o.style.display = s ? 'flex' : 'none'; 
            setTimeout(() => o.style.opacity = s ? '1' : '0', 10);
        }

        // Init Particles
        const container = document.getElementById('particle-container');
        for (let i = 0; i < 20; i++) {
            const p = document.createElement('div'); p.className = 'particle';
            p.style.width = p.style.height = Math.random() * 4 + 2 + 'px';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDuration = Math.random() * 10 + 5 + 's';
            container.appendChild(p);
        }

        setInterval(updateStats, 30000);
        updateStats();
    </script>
</body>
</html>
