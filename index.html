<style>
    body { 
        /* The dark tint (0.5) ensures your text is readable over the photo */
        background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), 
                    url('background.png') no-repeat center center fixed; 
        
        /* 'cover' is the king of backgrounds - it fills the screen perfectly */
        background-size: cover; 
        
        color: white; 
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh; /* Centers the box vertically on the screen */
    }

    .box { 
        background: rgba(20, 20, 20, 0.85); 
        border: 2px solid #00ff00; 
        padding: 40px; 
        border-radius: 20px; 
        width: 90%;
        max-width: 500px; 
        box-shadow: 0 20px 60px rgba(0,0,0,1); 
        
        /* Glassmorphism effect */
        backdrop-filter: blur(10px); 
        -webkit-backdrop-filter: blur(10px);
    }

    h1 { 
        color: #00ff00; 
        text-shadow: 4px 4px #000; 
        font-size: 4.5rem; 
        margin: 0; 
    }

    .hosts-container { 
        background: #000; 
        padding: 20px; 
        border-radius: 10px; 
        border: 1px dashed #00ff00; 
        margin: 25px 0; 
        text-align: left; 
    }

    code { 
        color: #00ff00; 
        font-family: 'Courier New', monospace; 
        font-size: 1rem; 
        line-height: 1.6; 
    }

    .btn { 
        background: #7289da; 
        color: white; 
        padding: 18px; 
        text-decoration: none; 
        border-radius: 8px; 
        font-weight: bold; 
        display: block; 
        font-size: 1.2rem;
        transition: transform 0.2s, background 0.2s; 
    }

    .btn:hover { 
        background: #5b6eae; 
        transform: scale(1.05); 
    }
</style>
